<!DOCTYPE html>
<html>
<head>
    <title>Daftar Tugas Praktikum PWB</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        h2{
            font-size: 32px;
        }

        input{
            width: 300px;
            padding: 10px;
            font-size: 18px;
        }

        button{
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }

        ul{
            width: 400px; /* Sedikit dilebarkan agar muat dengan tombol hapus */
            margin: 20px auto;
            text-align: left;
            font-size: 20px;
        }

        li{
            padding: 8px;
            display: flex; /* Menggunakan flexbox agar teks dan tombol rapi sejajar */
            justify-content: space-between;
            align-items: center;
        }

        /* Style khusus untuk tombol hapus agar terlihat lebih estetik */
        .btn-hapus {
            padding: 5px 10px;
            font-size: 14px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-hapus:hover {
            background-color: #cc0000;
        }
    </style>
</head>

<body>

    <h2>Daftar Tugas Semester 4 </h2>

    <p>Tambahkan tugas semester 4 yang akan dikerjakan.</p>

    <input type="text" id="input-praktikum" placeholder="Contoh: Membuat Form Login">

    <button onclick="tambahTugas()">Tambah</button>

    <ul id="daftar-tugas"></ul>

    <script>

        var daftarPraktikum = [];

        function tambahTugas() {

            var inputElement = document.getElementById("input-praktikum");

            if (inputElement.value != "") {
                daftarPraktikum.push(inputElement.value);
            }

            inputElement.value = "";

            tampilkanDaftar();

        }

        function tampilkanDaftar() {

            var daftarElement = document.getElementById("daftar-tugas");

            daftarElement.innerHTML = "";

            for (let i = 0; i < daftarPraktikum.length; i++) {
                // Modifikasi: Menambahkan elemen tombol hapus di setiap item list (li)
                // Mengirimkan indeks i ke fungsi hapusTugas()
                daftarElement.innerHTML += "<li>" + 
                    daftarPraktikum[i] + 
                    " <button class='btn-hapus' onclick='hapusTugas(" + i + ")'>Hapus</button></li>";
            }

        }

        // Fungsi baru untuk menghapus item dari array dan memperbarui tampilan
        function hapusTugas(index) {
            // Menghapus 1 item berdasarkan indeksnya menggunakan splice
            daftarPraktikum.splice(index, 1);
            
            // Panggil ulang fungsi ini agar tampilan list di HTML ikut ter-update
            tampilkanDaftar();
        }

    </script>

</body>
</html>

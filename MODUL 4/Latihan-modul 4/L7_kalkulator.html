<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Simpel</title>

    <style>
        /* Membuat container utama (body) memenuhi layar dan memposisikan konten di tengah */
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f4f4f9;
            font-family: Arial, sans-serif;
        }

        /* Styling box kalkulator */
        .calculator {
            width: 220px;
            border: 1px solid #ccc;
            padding: 15px;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }

        /* Perbaikan display agar lebih rapi */
        #display {
            width: 100%;
            height: 40px;
            margin-bottom: 15px;
            padding: 5px 10px;
            font-size: 18px;
            text-align: right; /* Angka rata kanan seperti kalkulator asli */
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #fafafa;
            color: #333;
        }

        /* Mengatur susunan tombol menggunakan grid agar presisi */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        /* Desain tombol simpel */
        .buttons button {
            height: 45px;
            font-size: 16px;
            cursor: pointer;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #f9f9f9;
            transition: background 0.2s;
        }

        /* Efek ketika tombol di-hover (disentuh kursor) */
        .buttons button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('/')">/</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('*')">*</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="appendValue('-')">-</button>

        <button onclick="clearDisplay()">C</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="calculate()">=</button>
        <button onclick="appendValue('+')">+</button>
    </div>
</div>

<script>
    // Menggunakan const karena element display tidak berubah referensinya
    const display = document.getElementById('display');

    function appendValue(value) {
        display.value += value;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculate() {
        // Validasi jika display kosong, jangan lakukan eval
        if (display.value === '') return;

        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik Cepat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f4f6f4; /* Background disesuaikan agak keabu-hijauan muda */
            font-size: 1.15rem; 
        }
        /* Tema Utama: Hijau Sage */
        .bg-sage {
            background-color: #87a987 !important;
        }
        .btn-sage {
            background-color: #709370 !important;
            color: white !important;
            border: none;
        }
        .btn-sage:hover {
            background-color: #5c7a5c !important;
        }
        .text-sage {
            color: #5c7a5c !important;
        }
        .border-sage {
            border-color: #87a987 !important;
        }
        .product-item { cursor: pointer; transition: 0.2s; }
        .product-item:hover { background-color: #f1f3f5; }
        .active-item { background-color: #e8efe8 !important; border-left: 6px solid #5c7a5c; }
        .slideshow-img { 
            height: 380px; 
            object-fit: contain; 
            background: white; 
        }
        .form-control, .btn {
            padding: 0.75rem 1rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header class="bg-sage text-white text-center py-4 mb-4 shadow-sm">
        <h1 class="fw-bold display-5 m-0">Toko Elektronik Cepat</h1>
        <div id="waktu-transaksi" class="fs-4 opacity-75 mt-2">Memuat waktu...</div>
    </header>

    <div class="container mb-5">
        <div class="row g-4">
            
            <div class="col-md-8">
                <div class="card p-4 text-center mb-4 shadow-sm">
                    <div class="position-relative mb-3">
                        <img id="display-gambar" src="" alt="Produk" class="img-fluid rounded slideshow-img w-100">
                        <button class="btn btn-dark btn-lg position-absolute top-50 start-0 translate-middle-y ms-3 px-3 py-2" onclick="prevGambar()">‹</button>
                        <button class="btn btn-dark btn-lg position-absolute top-50 end-0 translate-middle-y me-3 px-3 py-2" onclick="nextGambar()">›</button>
                    </div>
                    <h2 id="display-nama" class="fw-bold my-2">Nama Produk</h2>
                    <h3 id="display-harga" class="text-sage fw-bold fs-2">Rp 0</h3>
                </div>

                <div class="card p-4 mb-4 shadow-sm">
                    <h3 class="fw-bold border-bottom pb-2 mb-4">Form Pemesanan</h3>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Nama Pemesan</label>
                        <input type="text" id="namaPemesan" class="form-control" placeholder="Nama lengkap Anda">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Jumlah Pesan</label>
                            <input type="number" id="jumlahPesan" class="form-control" min="1" value="1">
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Kode Promo</label>
                            <input type="text" id="kodePromo" class="form-control" placeholder="DISKON10">
                        </div>
                    </div>
                    <button 
                    class="btn btn-sage w-100 fw-bold fs-5 mt-2 py-3" onclick="prosesPemesanan()">Pesan Sekarang
                    </button>
                </div>

                <div id="area-struk" class="card border-sage border-2 p-4 d-none shadow-sm bg-white">
                    <h3 class="text-sage fw-bold border-bottom pb-2 mb-3">✓ Ringkasan Pesanan</h3>
                    <div id="isi-struk" class="lh-lg fs-5"></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm">
                    <div class="card-header bg-dark text-white fw-bold fs-4 py-3">Daftar Produk</div>
                    <div class="list-group list-group-flush fs-5" id="daftar-produk-container"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const dataProduk = [
            {
                nama: "Laptop Asus Vivobook",
                harga: 11832663,
                gambar: 
                ["https://i.pinimg.com/1200x/16/3f/14/163f14f058e420ca6c797e04750d21b9.jpg",
                "https://img.overclockers.co.uk/images/LAP-ASU-03222/67e3722ddafeb064205e99921ed3267c.jpg?auto=compress%2Cformat&fit=fill&fill-color=fff&q=70&fill=solid&w=1678&h=1678", 
                "https://img.overclockers.co.uk/images/LAP-ASU-03222/1f3d59796176b80a08e973cc1b92c6e1.jpg?auto=compress%2Cformat&fit=fill&fill-color=fff&q=70&fill=solid&w=156&h=156"]
            },
            {
                nama: "Xiaomi 17 pro max",
                harga: 23999000,
                gambar: 
                ["https://i02.appmifile.com/523_operatorx_operatorx_uploadTiptapImage/25/09/2025/7cf08d52f00ca3b6aa5ccd4547cafbd8.jpg",
                 "https://i02.appmifile.com/304_operatorx_operatorx_uploadTiptapImage/25/09/2025/21ef35eac7a6b396c906c833ee109cbf.jpg"]
            },
            {
                nama: "Xiaomi pad 8 pro",
                harga: 9499000,
                gambar: 
                ["https://i02.appmifile.com/472_item_id/27/02/2026/a13122bc023bc5422ca2086fcf086dc8.png?thumb=1&f=webp&q=85", 
                "https://i02.appmifile.com/718_item_id/10/02/2026/b6d6327cf4d33868dd03418eecd8b587.png?thumb=1&f=webp&q=85"]
            }
        ];

        let produkAktifIndex = 0;
        let gambarAktifIndex = 0;

        // 1. Fungsi Waktu Real-time
        setInterval(() => {
            document.getElementById('waktu-transaksi').innerHTML = new Date().toLocaleString('id-ID');
        }, 1000);

        // 2 & 3. Render Tampilan Utama
        function updateDisplayUtama() {
            const produk = dataProduk[produkAktifIndex];
            document.getElementById('display-nama').innerText = produk.nama;
            document.getElementById('display-harga').innerText = "Rp " + produk.harga.toLocaleString('id-ID');
            document.getElementById('display-gambar').src = produk.gambar[gambarAktifIndex];
        }

        function renderDaftarProduk() {
            const container = document.getElementById('daftar-produk-container');
            container.innerHTML = "";
            dataProduk.forEach((produk, index) => {
                const isActive = index === produkAktifIndex ? 'active-item' : '';
                container.innerHTML += `
                    <div class="list-group-item product-item pD${isActive}" onclick="gantiProduk(${index})">
                        <div class="fw-bold">${produk.nama}</div>
                        <small class="text-muted fs-6">Rp ${produk.harga.toLocaleString('id-ID')}</small>
                    </div>`;
            });
        }

        function gantiProduk(index) {
            produkAktifIndex = index;
            gambarAktifIndex = 0;
            updateDisplayUtama();
            renderDaftarProduk();
        }

        function nextGambar() {
            gambarAktifIndex = (gambarAktifIndex + 1) % dataProduk[produkAktifIndex].gambar.length;
            updateDisplayUtama();
        }
        
        function prevGambar() {
            const totalGambar = dataProduk[produkAktifIndex].gambar.length;
            gambarAktifIndex = (gambarAktifIndex - 1 + totalGambar) % totalGambar;
            updateDisplayUtama();
        }

        // 5. Logika Pemesanan & Struk (Warna disesuaikan ke teks Sage)
        function prosesPemesanan() {
            const nama = document.getElementById('namaPemesan').value.trim();
            const jumlah = parseInt(document.getElementById('jumlahPesan').value);
            const promo = document.getElementById('kodePromo').value.trim().toUpperCase();
            
            if (nama === "" || isNaN(jumlah) || jumlah <= 0) {
                alert("Mohon isi Nama Pemesan dan Jumlah Pesan dengan benar!");
                return;
            }

            const produk = dataProduk[produkAktifIndex];
            const subtotal = produk.harga * jumlah;
            
            const potongan = (promo === "DISKON10") ? subtotal * 0.10 : 0;
            const totalAkhir = subtotal - potongan;
            
            const orderID = "INV-" + Math.floor(10000 + Math.random() * 90000);

            // Output Struk Pemesanan terperinci
            document.getElementById('isi-struk').innerHTML = `
                <div class="mb-2"><b>ID Pesanan:</b> <span class="text-mono">${orderID}</span></div>
                <div class="mb-2"><b>Nama Pemesan:</b> ${nama}</div>
                <div class="mb-2"><b>Produk:</b> ${produk.nama} (${jumlah} unit)</div>
                <hr class="my-3">
                <div class="mb-1"><b>Subtotal:</b> Rp ${subtotal.toLocaleString('id-ID')}</div>
                <div class="mb-2"><b>Potongan Promo:</b> - Rp ${potongan.toLocaleString('id-ID')}</div>
                <div class="fs-4 text-sage fw-bold mt-2">Total Akhir: Rp ${totalAkhir.toLocaleString('id-ID')}</div>
            `;

            document.getElementById('area-struk').classList.remove('d-none');
            document.getElementById('area-struk').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = function() {
            updateDisplayUtama();
            renderDaftarProduk();
        };
    </script>
</body>
</html>

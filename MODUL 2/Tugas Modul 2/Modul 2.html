<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum CSS Responsif</title>
    <style>
        /* 1. ATURAN DASAR (Reset & Biar Kotak Gak Melar)*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Kunci padding gak merubah ukuran */
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #add8e6; /* Biru muda */
            padding: 20px;
        }

        /* 2. TAMPILAN TEKS (Judul & Paragraf) */
        h1 {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            background-color: #d3d3d3; /* Abu-abu muda */
            color: black;
            padding: 15px;
            text-align: center;
            border-radius: 10px; /* Sudut membulat */
            margin-bottom: 20px;
        }

        /*  3. LAYOUT KOTAK-KOTAK (Default Desktop: 3 Kolom) */
        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Bikin 3 kolom sama rata */
            gap: 20px; /* Jarak antar kotak */
            max-width: 800px; /* Lebar maksimal biar gak ketebalan di laptop */
            margin: 0 auto; /* Biar posisi container ada di tengah halaman */
        }

        /* Setelan untuk semua kotak di dalam container */
        .box {
            border: 2px solid black;
            height: 150px;
            border-radius: 10px;
            display: flex;
            align-items: center;     /* Teks di tengah (vertikal) */
            justify-content: center;    /* Teks di tengah (horizontal) */
            font-weight: bold;
        }

        /* Warna masing-masing kotak */
        .merah-muda { background-color: #ff9999; }
        .hijau-muda { background-color: #99ff99; }
        .biru-muda  { background-color: #9999ff; }

        /*  4. RESPONSIVE DESIGN (Media Query) */
        /* Ketika layar seukuran Tablet (Lebar maks: 768px) */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: repeat(2, 1fr); /* Berubah jadi 2 kolom */
            }
        }

        /* Ketika layar seukuran HP (Lebar maks: 480px) */
        @media (max-width: 480px) {
            .container {
                grid-template-columns: 1fr; /* Berubah jadi 1 kolom ke bawah */
            }
            h1 {
                font-size: 28px; /* Judul mengecil di HP */
            }
            .box {
                height: 120px; /* Kotak memendek di HP */
            }
        }
    </style>
</head>
<body>

    <h1>Praktikum CSS</h1>
    <p>Ini tugas praktikum CSS dengan susunan layout yang responsif.</p>

    <div class="container">
        <div class="box merah-muda">Box 1</div>
        <div class="box hijau-muda">Box 2</div>
        <div class="box biru-muda">Box 3</div>
    </div>

</body>
</html>

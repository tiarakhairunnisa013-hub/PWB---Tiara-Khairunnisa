<!--Komponen Bootstrap 5-->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Pagination - Praktikum Tiara</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  <div class="container mt-3">
    <h2>Navigasi Modul Praktikum</h2>
    <p>Gunakan tombol di bawah untuk beralih antar halaman laporan praktikum Tiara:</p> 
    
    <ul class="pagination">
      <!-- Tombol Kembali (Disabled karena berada di modul awal) -->
      <li class="page-item disabled"><a class="page-link" href="#">Kembali</a></li>
      
      <!-- Halaman Modul (Modul 1 ditandai 'active' sebagai modul yang sedang dibuka) -->
      <li class="page-item active"><a class="page-link" href="#">Modul 1</a></li>
      <li class="page-item"><a class="page-link" href="#">Modul 2</a></li>
      <li class="page-item"><a class="page-link" href="#">Modul 3</a></li>
      
      <!-- Tombol Lanjut -->
      <li class="page-item"><a class="page-link" href="#">Lanjut</a></li>
    </ul>
  </div>
</body>
</html>

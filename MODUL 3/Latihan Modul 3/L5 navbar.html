<!--Komponen Bootstrap 5-->
<!DOCTYPE html>
<html lang="en">
<head>
  <title>Bootstrap Navbar - Praktikum Tiara</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
  
  <!-- Navbar Utama -->
  <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
    <div class="container-fluid">
      <!-- Nama Brand diganti Jadi Nama Tiara & Praktikum -->
      <a class="navbar-brand" href="javascript:void(0)">Praktikum Tiara</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mynavbar">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mynavbar">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="javascript:void(0)">Beranda</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:void(0)">Modul</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="javascript:void(0)">Nilai Tugas</a>
          </li>
          <!-- Dropdown untuk pilihan Materi Praktikum -->
          <li class="nav-item dropdown">
            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Materi</a>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item" href="#">Modul 1: Table</a></li>
              <li><a class="dropdown-item" href="#">Modul 2: Card</a></li>
              <li><a class="dropdown-item" href="#">Modul 3: Modal & Navbar</a></li>
            </ul>
          </li>
        </ul>
        <!-- Form Pencarian Tugas -->
        <form class="d-flex">
          <input class="form-control me-2" type="text" placeholder="Cari materi...">
          <button class="btn btn-primary" type="button">Cari</button>
        </form>
      </div>
    </div>
  </nav>

  <!-- Konten Halaman -->
  <div class="container-fluid mt-3">
    <h3>Dashboard Praktikum</h3>
    <p>Selamat datang di ruang lingkup praktikum web milik Tiara Khairunnisa.</p>
  </div>
  
</body>
</html>

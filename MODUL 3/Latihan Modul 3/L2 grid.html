<!--Sistem grid di Bootstrap 5-->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Latihan Grid 3 Kolom</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        .col1 { 
            background-color: red;
            color: white; 
            font-weight: bold;
            text-align: center;
        }
        .col2 { 
            background-color: blue; 
            color: white; 
            font-weight: bold;
            text-align: center;
        }
        .col3 { 
            background-color: green;
            color: white;  
            font-weight: bold;
            text-align: center;
        }
    </style>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<div class="container mt-3">
    <div class="row">
        <div class="col col1">MODUL 1 HTML DASAR</div>
        <div class="col col2">MODUL 2 PENGENALAN CSS</div>
        <div class="col col3">MODUL 3 BOOSTRAP </div>
    </div>
</div>
</body>
</html>

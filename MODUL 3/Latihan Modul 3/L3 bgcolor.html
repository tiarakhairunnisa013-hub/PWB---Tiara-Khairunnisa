<!-- Typography dan Utilities -->
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Praktikum Pemrograman Web</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>
</head>

<body>
    <div class="container mt-3">
        <h2>Tiara Khairunnisa - Praktikum Pemrograman Web</h2>

        <div class="bg-primary p-3 text-white">
            Bootstrap Warna Primary
        </div>

        <div class="bg-success p-3 text-white">
            Bootstrap Warna Success
        </div>

        <div class="bg-info p-3">
            Bootstrap Warna Info
        </div>

        <div class="bg-warning p-3">
            Bootstrap Warna Warning
        </div>

        <div class="bg-danger p-3 text-white">
            Bootstrap Warna Danger
        </div>

        <div class="bg-secondary p-3 text-white">
            Bootstrap Warna Secondary
        </div>

        <div class="bg-dark p-3 text-white">
            Bootstrap Warna Dark
        </div>

        <div class="bg-light p-3 border">
            Bootstrap Warna Light
        </div>
    </div>
</body>
</html>
